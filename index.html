<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Waveform Synthesizer</title>
   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
         font-family: "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      :root {
         --primary: #6366F1;
         --secondary: #8B5CF6;
         --dark: #1E293B;
         --darker: #0F172A;
         --light: #E2E8F0;
         --accent: #EC4899;
      }

      body {
         background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
         min-height: 100vh;
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         color: var(--light);
         padding: 20px;
      }

      .container {
         width: 100%;
         max-width: 900px;
         background: rgba(30, 41, 59, 0.6);
         backdrop-filter: blur(15px);
         border-radius: 20px;
         padding: 30px;
         box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
         border: 1px solid rgba(255, 255, 255, 0.05);
      }

      h1 {
         text-align: center;
         background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
         -webkit-background-clip: text;
         background-clip: text;
         color: transparent;
         font-size: 2.5rem;
         margin-bottom: 30px;
         letter-spacing: 0.5px;
      }

      .controls-grid {
         display: grid;
         grid-template-columns: 1fr 1fr;
         gap: 25px;
         margin-bottom: 30px;
      }

      .control-group {
         background: rgba(15, 23, 42, 0.8);
         padding: 20px;
         border-radius: 15px;
         box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .control-group h3 {
         color: var(--primary);
         margin-bottom: 15px;
         font-size: 1.1rem;
      }

      .waveform-selector {
         display: flex;
         gap: 10px;
         flex-wrap: wrap;
      }

      .wave-btn {
         flex: 1;
         min-width: 80px;
         padding: 10px 15px;
         border: none;
         border-radius: 8px;
         background: var(--dark);
         color: var(--light);
         cursor: pointer;
         transition: all 0.2s ease;
         border: 2px solid transparent;
      }

      .wave-btn.active {
         background: var(--primary);
         color: #FFF;
         border-color: var(--secondary);
         box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
      }

      .wave-btn:hover {
         transform: translateY(-2px);
      }

      .slider-group {
         margin: 15px 0;
      }

      .slider-group label {
         display: block;
         margin-bottom: 8px;
         font-size: 0.95rem;
         color: rgba(226, 232, 240, 0.8);
      }

      input[type="range"] {
         width: 100%;
         height: 8px;
         border-radius: 4px;
         background: var(--dark);
         outline: none;
         -webkit-appearance: none;
      }

      input[type="range"]::-webkit-slider-thumb {
         -webkit-appearance: none;
         width: 20px;
         height: 20px;
         border-radius: 50%;
         background: var(--primary);
         cursor: pointer;
         box-shadow: 0 0 10px rgba(99, 102, 241, 0.7);
         transition: all 0.2s ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
         background: var(--secondary);
         transform: scale(1.1);
      }

      .buttons-group {
         display: flex;
         gap: 15px;
         justify-content: center;
         margin-top: 20px;
      }

      .action-btn {
         padding: 12px 30px;
         border: none;
         border-radius: 10px;
         font-size: 1.1rem;
         font-weight: 600;
         cursor: pointer;
         transition: all 0.2s ease;
      }

      #playBtn {
         background: linear-gradient(90deg, var(--primary), var(--secondary));
         color: #FFF;
      }
 
      #stopBtn {
         background: var(--dark);
         color: var(--light);
         border: 2px solid rgba(226, 232, 240, 0.2);
      }

      .action-btn:hover {
         transform: translateY(-3px);
         box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .canvas-container {
         margin-top: 30px;
         background: rgba(15, 23, 42, 0.9);
         padding: 20px;
         border-radius: 15px;
      }

      .canvas-container h3 {
         color: var(--primary);
         margin-bottom: 15px;
         text-align: center;
      }

      canvas {
         width: 100%;
         height: 200px;
         border-radius: 10px;
         background: var(--darker);
         display: block;
      }

      @media (max-width: 768px) {
         .controls-grid {
            grid-template-columns: 1fr;
         }

         h1 {
            font-size: 2rem;
         }
      }
   </style>
</head>
<body>
   <div class="container">
      <h1>Waveform Synthesizer</h1>

      <div class="controls-grid">
         <div class="control-group">
            <h3>Waveform Type</h3>
            <div class="waveform-selector">
               <button class="wave-btn active" data-wave="sine">Sine</button>
               <button class="wave-btn" data-wave="square">Square</button>
               <button class="wave-btn" data-wave="sawtooth">Sawtooth</button>
               <button class="wave-btn" data-wave="triangle">Triangle</button>
            </div>

            <div class="slider-group">
               <label for="frequency">Frequency (Hz): <span id="freqValue">440</span></label>
               <input type="range" id="frequency" min="20" max="2000" value="440" step="1">
            </div>
         </div>

         <div class="control-group">
            <h3>Audio Controls</h3>
            <div class="slider-group">
               <label for="volume">Volume (%): <span id="volValue">50</span></label>
               <input type="range" id="volume" min="0" max="100" value="50" step="1">
            </div>

            <div class="slider-group">
               <label for="detune">Detune (Cents): <span id="detuneValue">0</span></label>
               <input type="range" id="detune" min="-100" max="100" value="0" step="1">
            </div>

            <div class="buttons-group">
               <button class="action-btn" id="playBtn">Play Sound</button>
               <button class="action-btn" id="stopBtn">Stop Sound</button>
            </div>
         </div>
      </div>

      <div class="canvas-container">
         <h3>Real-Time Waveform Visualization</h3>
         <canvas id="waveformCanvas"></canvas>
      </div>
   </div>

   <script>
      const playBtn = document.getElementById("playBtn");
      const stopBtn = document.getElementById("stopBtn");
      const volumeSlider = document.getElementById("volume");
      const volumeValue = document.getElementById("volValue");
      const frequencySlider = document.getElementById("frequency");
      const freqValue = document.getElementById("freqValue");
      const detuneSlider = document.getElementById("detune");
      const detuneValue = document.getElementById("detuneValue");
      const waveBtns = document.querySelectorAll(".wave-btn");
      const canvas = document.getElementById("waveformCanvas");
      const ctx = canvas.getContext("2d");
      let audioContext;
      let oscillator;
      let gainNode;
      let analyser;
      let isPlaying = false;
      let currentWaveform = "sine";

      function resizeCanvas() {
         const DPR = window.devicePixelRatio || 1;
         canvas.width = canvas.offsetWidth * DPR;
         canvas.height = canvas.offsetHeight * DPR;
         ctx.scale(DPR, DPR);
      }

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      function initAudio() {
         if (!audioContext) {
             audioContext = new (window.AudioContext || window.webkitAudioContext)();
             gainNode = audioContext.createGain();
             analyser = audioContext.createAnalyser();
             analyser.fftSize = 2048;

             gainNode.connect(analyser);
             analyser.connect(audioContext.destination);
         }
      }

      function createOscillator() {
         if (oscillator) {
             oscillator.stop();
             oscillator.disconnect();
         }

         oscillator = audioContext.createOscillator();
         oscillator.type = currentWaveform;
         oscillator.frequency.value = parseFloat(frequencySlider.value);
         oscillator.detune.value = parseFloat(detuneSlider.value);

         oscillator.connect(gainNode);
      }

      function drawWaveform() {
         if (!analyser) return;

         const bufferLength = analyser.frequencyBinCount;
         const dataArray = new Uint8Array(bufferLength);

         requestAnimationFrame(drawWaveform);
         analyser.getByteTimeDomainData(dataArray);

         ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);

         ctx.strokeStyle = "rgba(99, 102, 241, 0.1)";
         ctx.lineWidth = 1;

         for (let y = 0; y <= canvas.offsetHeight; y += 20) {
              ctx.beginPath();
              ctx.moveTo(0, y);
              ctx.lineTo(canvas.offsetWidth, y);
              ctx.stroke();
         }

         for (let x = 0; x <= canvas.offsetWidth; x += 40) {
              ctx.beginPath();
              ctx.moveTo(x, 0);
              ctx.lineTo(x, canvas.offsetHeight);
              ctx.stroke();
         }

         ctx.strokeStyle = "rgba(99, 102, 241, 0.3)";
         ctx.beginPath();
         ctx.moveTo(0, canvas.offsetHeight / 2);
         ctx.lineTo(canvas.offsetWidth, canvas.offsetHeight / 2);
         ctx.stroke();

         ctx.lineWidth = 3;
         ctx.strokeStyle = currentWaveform === "sine" ? "#6366F1" :
                           currentWaveform === "square" ? "#8B5CF6" :
                           currentWaveform === "sawtooth" ? "#EC4899" : "#10B981";
         ctx.beginPath();

         const sliceWidth = canvas.offsetWidth / bufferLength;
         let x = 0;

         for (let i = 0; i < bufferLength; i++) {
              const v = dataArray[i] / 128.0;
              const y = v * canvas.offsetHeight / 2;
              i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);

              x += sliceWidth;
         }

         ctx.lineTo(canvas.offsetWidth, canvas.offsetHeight / 2);
         ctx.stroke();

         ctx.strokeStyle = `${ctx.strokeStyle}80`;
         ctx.lineWidth = 5;
         ctx.stroke();
      }

      waveBtns.forEach(btn => {
          btn.addEventListener("click", () => {
              waveBtns.forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
              currentWaveform = btn.dataset.wave;

              if (isPlaying) {
                  createOscillator();
                  oscillator.start();
              }
          });
      });

      volumeSlider.addEventListener("input", () => {
          const volume = parseFloat(volumeSlider.value) / 100;
          volumeValue.textContent = volumeSlider.value;
          if (gainNode) gainNode.gain.value = volume;
      });

      frequencySlider.addEventListener("input", () => {
          const freq = parseFloat(frequencySlider.value);
          freqValue.textContent = freq;
          if (oscillator) oscillator.frequency.value = freq;
      });

      detuneSlider.addEventListener("input", () => {
          const detune = parseFloat(detuneSlider.value);
          detuneValue.textContent = detune;
          if (oscillator) oscillator.detune.value = detune;
      });

      playBtn.addEventListener("click", () => {
          if (!isPlaying) {
              initAudio();
              audioContext.resume();
              createOscillator();
              oscillator.start();
              isPlaying = true;
              drawWaveform();
              playBtn.textContent = "Playing...";
          }
      });

      stopBtn.addEventListener("click", () => {
          if (isPlaying && oscillator) {
              oscillator.stop();
              oscillator.disconnect();
              isPlaying = false;
              playBtn.textContent = "Play Sound";
              ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
          }
      });

      gainNode && (gainNode.gain.value = parseFloat(volumeSlider.value) / 100);
   </script>
</body>
</html>
